apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: mcp-gateway-route
  namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
  labels:
    gateway: gke-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  parentRefs:
    - kind: Gateway
      name: gke-gateway
      namespace: {{ .Values.config.namespacePrefix }}gke-gateway
      sectionName: https
  hostnames:
    - {{ printf "mcp.%s" .Values.config.domain | quote }}
  rules:
    # route `mcp.domain` to nginx port inside registry service
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: registry
          namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
          port: 80
    # route `/auth-server` to auth-server service; strip prefix `/auth-server` to `/`
    - matches:
        - path:
            type: PathPrefix
            value: /auth-server
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: {{ printf "mcp.%s" .Values.config.domain | quote }}
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: auth-server
          namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
          port: 8888
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: mcp-gateway-registry-healthcheck
  namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    healthyThreshold: 1
    unhealthyThreshold: 2
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        port: 7860
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: registry
    namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: mcp-gateway-auth-server-healthcheck
  namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    healthyThreshold: 1
    unhealthyThreshold: 2
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        port: 8888
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: auth-server
    namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
---
# Allow MCP Gateway Registry ingress from Gateway
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-registry-ingress-from-gateway
  namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 80     # HTTP nginx
    - protocol: TCP
      port: 7860   # Registry health check
---
# Allow MCP Auth Server ingress from Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-auth-server-ingress
  namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.config.namespacePrefix }}mcp-gateway-auth-server
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 8888
---
# Allow MCP Gateway egress to Auth Server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-gateway-egress-to-auth-server
  namespace: {{ .Values.config.namespacePrefix }}mcp-gateway-registry
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: {{ .Values.config.namespacePrefix }}mcp-gateway-auth-server
    ports:
    - protocol: TCP
      port: 8888
{{- end }}
