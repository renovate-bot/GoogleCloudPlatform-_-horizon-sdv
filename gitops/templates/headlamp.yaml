apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}headlamp
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  source:
    chart: headlamp
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    targetRevision: 0.36.0
    helm:
      values: |
        serviceAccount:
          create: false
          name: headlamp-admin
        clusterRoleBinding:
          create: false
        config:
          baseURL: "/headlamp"
          pluginsDir: /build/plugins
      #  initContainers:
      #    - command:
      #        - /bin/sh
      #        - '-c'
      #        - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
      #      image: quay.io/kubescape/headlamp-plugin:v0.9.1
      #      name: kubescape-plugin
      #      volumeMounts:
      #        - mountPath: /build/plugins
      #          name: headlamp-plugins
      #  volumeMounts:
      #    - name: headlamp-plugins
      #      mountPath: /build/plugins
      #  volumes:
      #    - name: headlamp-plugins
      #      emptyDir: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}headlamp
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
---
# Allow Headlamp ingress from Token Injector
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-headlamp-ingress
  namespace: {{ .Values.config.namespacePrefix }}headlamp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: headlamp
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: {{ .Values.config.namespacePrefix }}headlamp-token-injector
    ports:
    - protocol: TCP
      port: 80     # Headlamp UI
    - protocol: TCP
      port: 4466   # Headlamp UI

{{- end }}
---
# Allow Headlamp to access Kubernetes API
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-headlamp-egress-to-kube-api
  namespace: {{ .Values.config.namespacePrefix }}headlamp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: headlamp
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443    # Kubernetes API

{{- end }}
