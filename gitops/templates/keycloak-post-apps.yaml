apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.config.namespacePrefix }}keycloak-post-mcp-gateway-registry-job
  namespace: {{ .Values.config.namespacePrefix }}keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: Sync
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 120
  template:
    spec:
      serviceAccountName: keycloak-writer-sa
      containers:
        - name: keycloak-post-mcp-gateway-registry-container
          env:
            - name: NAMESPACE_PREFIX
              value: {{ .Values.config.namespacePrefix }}
            - name: PLATFORM_URL
              value: http://{{ .Values.config.namespacePrefix }}keycloak-keycloakx-http:8080
            - name: MCP_SUBDOMAIN
              value: {{ printf "https://mcp.%s" .Values.config.domain | quote }}
            - name: KEYCLOAK_USERNAME
              value: "admin"
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-creds
                  key: password
            - name: MCP_GATEWAY_REGISTRY_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-mcp-gateway-registry-admin
                  key: username
            - name: MCP_GATEWAY_REGISTRY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-mcp-gateway-registry-admin
                  key: password
          image: {{ .Values.config.postjobs.keycloakMcpGatewayRegistry }}
          imagePullPolicy: Always
      restartPolicy: Never