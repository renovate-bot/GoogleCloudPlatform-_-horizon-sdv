apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-writer-sa
  namespace: {{ .Values.config.namespacePrefix }}keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-writer-role
  namespace: {{ .Values.config.namespacePrefix }}keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-writer-rolebinding
  namespace: {{ .Values.config.namespacePrefix }}keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "4"
subjects:
  - kind: ServiceAccount
    name: keycloak-writer-sa
roleRef:
  kind: Role
  name: keycloak-writer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.config.namespacePrefix }}keycloak-cluster-writer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: keycloak-writer-sa
    namespace: {{ .Values.config.namespacePrefix }}keycloak
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.config.namespacePrefix }}keycloak-post-mtk-connect-job
  namespace: {{ .Values.config.namespacePrefix }}keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: Sync
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 120
  template:
    spec:
      serviceAccountName: keycloak-writer-sa
      containers:
        - name: keycloak-post-mtk-connect-container
          env:
            - name: NAMESPACE_PREFIX
              value: {{ .Values.config.namespacePrefix }}
            - name: PLATFORM_URL
              value: http://{{ .Values.config.namespacePrefix }}keycloak-keycloakx-http:8080
            - name: DOMAIN
              value: https://{{ .Values.config.domain }}
            - name: KEYCLOAK_USERNAME
              value: "admin"
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-creds
                  key: password
          image: {{ .Values.config.postjobs.keycloakmtkconnect }}
          imagePullPolicy: Always
      restartPolicy: Never
---
