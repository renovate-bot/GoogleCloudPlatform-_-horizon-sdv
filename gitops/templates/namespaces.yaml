# IMPORTANT: When adding a new namespace, always add:
# 1. default-deny-all NetworkPolicy (wave 0)
# 2. allow-dns NetworkPolicy (wave 1)
# immediately after the namespace definition!

apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.config.namespacePrefix }}horizon
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
# Default Deny All Traffic - Horizon Namespace
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.config.namespacePrefix }}horizon
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
{{- end }}
---
# Allow DNS for horizon namespace
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ .Values.config.namespacePrefix }}horizon
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
{{- end }}
---
# Allow Landing Page internet egress
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-landingpage-egress-to-internet
  namespace: {{ .Values.config.namespacePrefix }}horizon
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: landingpage
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 443    # HTTPS
    - protocol: TCP
      port: 80     # HTTP
{{- end }}
---
