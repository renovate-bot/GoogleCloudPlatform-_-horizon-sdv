---
# Allow ArgoCD internal communication
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-internal-communication
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: argocd
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: argocd
    ports:
    - protocol: TCP
      port: 8080   # ArgoCD Server
    - protocol: TCP
      port: 8081   # Repo Server
    - protocol: TCP
      port: 6379   # Redis
    - protocol: TCP
      port: 5556   # Dex gRPC
    - protocol: TCP
      port: 5557   # Dex HTTP
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: argocd
    ports:
    - protocol: TCP
      port: 8080   # ArgoCD Server
    - protocol: TCP
      port: 8081   # Repo Server
    - protocol: TCP
      port: 6379   # Redis
    - protocol: TCP
      port: 5556   # Dex gRPC
    - protocol: TCP
      port: 5557   # Dex HTTP

{{- end }}
---
# Allow ArgoCD to access Kubernetes API
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-egress-to-kube-api
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: argocd
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443    # Kubernetes API

{{- end }}
---
# Allow ArgoCD to access all namespaces (for deployments)
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-egress-to-all-namespaces
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}

{{- end }}
---
# Allow ArgoCD Dex Server to access Keycloak
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-dex-egress-to-keycloak
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-dex-server
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.config.namespacePrefix }}keycloak
      podSelector:
        matchLabels:
          app.kubernetes.io/name: keycloakx
    ports:
    - protocol: TCP
      port: 8080   # OAuth/OIDC
{{- end }}
