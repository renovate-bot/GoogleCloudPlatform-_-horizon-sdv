apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: jenkins-route
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  labels:
    gateway: gke-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  parentRefs:
    - kind: Gateway
      name: gke-gateway
      namespace: {{ .Values.config.namespacePrefix }}gke-gateway
      sectionName: https
  hostnames:
    - {{ .Values.config.domain }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /jenkins
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: {{ .Values.config.domain }}
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /jenkins
      backendRefs:
        - name: {{ .Values.config.namespacePrefix }}jenkins
          port: 8080
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: jenkins-healthcheck
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    healthyThreshold: 1
    unhealthyThreshold: 2
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        port: 8080
        requestPath: /jenkins/login
  targetRef:
    group: ""
    kind: Service
    name: {{ .Values.config.namespacePrefix }}jenkins
---
# Allow Jenkins ingress from Gateway
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-jenkins-ingress-from-gateway
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jenkins
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 8080   # HTTP UI

{{- end }}
