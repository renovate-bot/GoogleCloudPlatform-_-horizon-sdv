apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: headlamp-route
  namespace: {{ .Values.config.namespacePrefix }}headlamp
  labels:
    gateway: gke-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - kind: Gateway
      name: gke-gateway
      namespace: {{ .Values.config.namespacePrefix }}gke-gateway
      sectionName: https
  hostnames:
    -  {{ .Values.config.domain }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headlamp/
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname:  {{ .Values.config.domain }}
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /headlamp/
      backendRefs:
        - name: {{ .Values.config.namespacePrefix }}headlamp-oauth2-proxy
          port: 80
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: headlamp-healthcheck
  namespace: {{ .Values.config.namespacePrefix }}headlamp
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    healthyThreshold: 1
    unhealthyThreshold: 2
    logConfig:
      enabled: true
    config:
      type: HTTP
      httpHealthCheck:
        portSpecification: USE_SERVING_PORT
        requestPath: /ping
        host: {{ .Values.config.domain }}
  targetRef:
    group: ""
    kind: Service
    name: {{ .Values.config.namespacePrefix }}headlamp-oauth2-proxy
---
# Allow OAuth2 Proxy ingress from Gateway
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-oauth2-proxy-ingress-from-gateway
  namespace: {{ .Values.config.namespacePrefix }}headlamp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 80     # HTTP traffic
    - protocol: TCP
      port: 4180   # OAuth2 proxy
    - protocol: TCP
      port: 44180  # Token injector

{{- end }}
