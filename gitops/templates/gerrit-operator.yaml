{{- if not .Values.config.isSubEnvironment }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gerrit-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: horizon-sdv
  source:
    repoURL: https://github.com/GerritCodeReview/k8s-gerrit
    targetRevision: 7c0185d9f1c72fafde047bcb70d6943671fe7f06
    path: helm-charts/gerrit-operator
    helm:
      values: |
        image:
          tag: v0.1-767-g7c0185d9
  destination:
    server: https://kubernetes.default.svc
    namespace: gerrit-operator
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    automated: {}
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.spec.strategy
---
# Allow Gerrit Operator to access Kubernetes API
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gerrit-operator-egress-to-kube-api
  namespace: gerrit-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443    # Kubernetes API
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 443    # Kubernetes API
    - protocol: TCP
      port: 6443   # Kubernetes API (alternative port)

{{- end }}
---
# Allow Gerrit Operator to access Gerrit namespace
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gerrit-operator-egress-to-gerrit
  namespace: gerrit-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: gerrit
    ports:
    - protocol: TCP
      port: 8080   # Gerrit HTTP API
    - protocol: TCP
      port: 29418  # Gerrit SSH port
{{- end }}
---
# Allow Kubernetes API server to access Gerrit Operator webhook
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-to-gerrit-operator-webhook
  namespace: gerrit-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app: gerrit-operator
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 8080  # Webhook port
{{- end }}
{{- end }}
