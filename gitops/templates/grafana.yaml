apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}grafana
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 9.3.0
    helm:
      values: |
        ingress:
          enabled: false  # Disable traditional ingress since GKE Gateway API is used
          path: /grafana/?(.*)
        hosts:
          - {{ .Values.config.domain }}

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://{{ .Values.config.namespacePrefix }}prometheus-frontend.{{ .Values.config.namespacePrefix }}monitoring.svc:9090
                isDefault: true
                editable: true

        dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: 'default'
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default

        dashboards:
          default:
            node-exporter-full:
              gnetId: 1860
              revision: 41  # Use the latest revision available
              datasource: Prometheus
            container-cpu-usage-vs-throttling:
              gnetId: 11848
              revision: 1  # Use the latest revision available
              datasource: Prometheus
            k8s-dashboard:
              gnetId: 15661
              revision: 1 # Used older version becasue of issues in newest, v2 error  datasource ${DS__VICTORIAMETRICS_PROD_ALL} was not found
              datasource: Prometheus

        grafana.ini:
          server:
            root_url: https://{{ .Values.config.domain }}/grafana
            serve_from_sub_path: true
            domain: {{ .Values.config.domain }}
          auth:
            disable_login_form: false
          auth.generic_oauth:
            verbose_logging: false
            enabled: true
            name: keycloak
            allow_sign_up: true
            scopes: openid profile email
            client_id: grafana-oauth
            client_secret: SOME_EXAMPLE_client_secret123456
            auth_url: https://{{ .Values.config.domain }}/auth/realms/horizon/protocol/openid-connect/auth
            token_url: https://{{ .Values.config.domain }}/auth/realms/horizon/protocol/openid-connect/token
            api_url: https://{{ .Values.config.domain }}/auth/realms/horizon/protocol/openid-connect/userinfo
            allow_assign_grafana_admin: true
            role_attribute_path: contains(groups[*], 'horizon-grafana-administrators') && 'Admin' || contains(groups[*], 'horizon-grafana-viewers') && 'Viewer'
            login_attribute_path: username
            name_attribute_path: name
            email_attribute_path: email
            role_attribute_strict: true
        assertNoLeakedSecrets: false
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - jqPathExpressions:
        - '.data["grafana.ini"]'
      kind: ConfigMap
      name: {{ .Values.config.namespacePrefix }}grafana
      namespace: {{ .Values.config.namespacePrefix }}monitoring
---
# Allow Grafana to access Prometheus
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-egress-to-prometheus
  namespace: {{ .Values.config.namespacePrefix }}monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 9090   # Prometheus API
{{- end }}
---
# Allow Grafana post-jobs to access Grafana
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-post-jobs-egress-to-grafana
  namespace: {{ .Values.config.namespacePrefix }}monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      job-name: {{ .Values.config.namespacePrefix }}grafana-post-job
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: grafana
    ports:
    - protocol: TCP
      port: 3000   # Grafana HTTP API
{{- end }}
---
# Allow Grafana post-jobs internet egress
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-post-jobs-egress-to-internet
  namespace: {{ .Values.config.namespacePrefix }}monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      job-name: {{ .Values.config.namespacePrefix }}grafana-post-job
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 443    # HTTPS
    - protocol: TCP
      port: 80     # HTTP
{{- end }}
---
# Allow Grafana post-jobs to access Kubernetes API
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-post-jobs-egress-to-kube-api
  namespace: {{ .Values.config.namespacePrefix }}monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      job-name: {{ .Values.config.namespacePrefix }}grafana-post-job
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 443    # Kubernetes API
    - protocol: TCP
      port: 6443   # Kubernetes API (alternative port)

{{- end }}
