apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.config.namespacePrefix }}jenkins-rwo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
provisioner: pd.csi.storage.gke.io
allowVolumeExpansion: true
volumeBindingMode: Immediate
reclaimPolicy: Delete
parameters:
  type: pd-balanced
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.config.namespacePrefix }}sdv-mirror-zonal-rwx
  annotations:
    argocd.argoproj.io/sync-wave: "3"
provisioner: filestore.csi.storage.gke.io
allowVolumeExpansion: true
volumeBindingMode: Immediate
reclaimPolicy: Delete
parameters:
  tier: zonal
  network: sdv-network
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-home-volume
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 32Gi
  storageClassName: {{ .Values.config.namespacePrefix }}jenkins-rwo
  volumeMode: Filesystem
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-sa
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    iam.gke.io/gcp-service-account: gke-{{ .Values.config.namespacePrefix }}jenkins-sa@{{ .Values.config.projectID }}.iam.gserviceaccount.com
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: terraform-workloads-sa
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    iam.gke.io/gcp-service-account: gke-{{ .Values.config.namespacePrefix }}tf-wl-sa@{{ .Values.config.projectID }}.iam.gserviceaccount.com
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-writer-role
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs:
      [
        "create",
        "delete",
        "deletecollection",
        "get",
        "list",
        "patch",
        "update",
        "watch",
      ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.config.namespacePrefix }}terraform-workloads-writer-cluster-role
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs:
      [
        "create",
        "delete",
        "deletecollection",
        "get",
        "list",
        "patch",
        "update",
        "watch",
      ]
  - apiGroups: [""]
    resources: ["persistentvolumes", "persistentvolumeclaims"]
    verbs: 
      [
        "create",
        "get",
        "list",
        "watch",
        "delete",
        "update",
        "patch"
      ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-writer-rolebinding
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "4"
subjects:
  - kind: ServiceAccount
    name: jenkins-sa
roleRef:
  kind: Role
  name: jenkins-writer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.config.namespacePrefix }}terraform-workloads-writer-cluster-rolebinding
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "4"
subjects:
  - kind: ServiceAccount
    name: terraform-workloads-sa
    namespace: {{ .Values.config.namespacePrefix }}jenkins
roleRef:
  kind: ClusterRole
  name: {{ .Values.config.namespacePrefix }}terraform-workloads-writer-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-initial-creds
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "1"
stringData:
  jenkins-admin-user: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-git-creds
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  labels:
    {{- if eq .Values.git.authMethod "app" }}
    "jenkins.io/credentials-type": "gitHubApp"
    {{- else }}
    "jenkins.io/credentials-type": "usernamePassword"
    {{- end }}
  annotations:
    "jenkins.io/credentials-description": "Git"
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  id: "git-creds"
  {{- if eq .Values.git.authMethod "pat" }}
  username: {{ .Values.git.username }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-gce-creds
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  labels:
    "jenkins.io/credentials-type": "googleRobotPrivateKey"
  annotations:
    "jenkins.io/credentials-description": "GCE Creds"
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  id: "gce-creds"
  projectId: {{ .Values.config.projectID }}
---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-cuttlefish-vm-ssh-private-key
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  labels:
    jenkins.io/credentials-type: "basicSSHUserPrivateKey"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    jenkins.io/credentials-description: "Cuttlefish VM SSH Private Key"
type: Opaque
stringData:
  username: "jenkins"
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: jenkins-secret-store
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.config.projectID }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.config.region }}
          clusterName: sdv-cluster
          serviceAccountRef:
            name: jenkins-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-initial-secret
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 10s
  secretStoreRef:
    kind: SecretStore
    name: jenkins-secret-store
  target:
    name: jenkins-initial-creds
    creationPolicy: Merge
  data:
    - secretKey: jenkins-admin-password
      remoteRef:
        key: {{ .Values.config.namespacePrefix }}jenkins-admin-password-b64
        decodingStrategy: Base64
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-git-creds-secret
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 10s
  secretStoreRef:
    kind: SecretStore
    name: jenkins-secret-store
  target:
    name: jenkins-git-creds
    creationPolicy: Merge
  data:
    {{- if eq .Values.git.authMethod "app" }}
    - secretKey: appID
      remoteRef:
        key: {{ .Values.config.namespacePrefix }}github-app-id-b64
        decodingStrategy: Base64
    - secretKey: privateKey
      remoteRef:
        key: {{ .Values.config.namespacePrefix }}github-app-private-key-pkcs8-b64
        decodingStrategy: Base64
    {{- else }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.config.namespacePrefix }}git-pat-b64
        decodingStrategy: Base64
    {{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-gce-creds-secret
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 10s
  secretStoreRef:
    kind: SecretStore
    name: jenkins-secret-store
  target:
    name: jenkins-gce-creds
    creationPolicy: Merge
  data:
    - secretKey: gce-creds-json
      remoteRef:
        key: gce-creds
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-cuttlefish-vm-ssh-private-key-secret
  namespace: {{ .Values.config.namespacePrefix }}jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 10s
  secretStoreRef:
    kind: SecretStore
    name: jenkins-secret-store
  target:
    name: jenkins-cuttlefish-vm-ssh-private-key
    creationPolicy: Merge
  data:
    - secretKey: privateKey
      remoteRef:
        key: {{ .Values.config.namespacePrefix }}jenkins-cuttlefish-ssh-key-b64
        decodingStrategy: Base64