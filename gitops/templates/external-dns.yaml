apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}external-dns
  namespace: {{ .Values.config.namespacePrefix }}argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.19.0
    helm:
      values: |
        provider: google
        google:
          project: "{{ .Values.config.projectID }}"
        
        domainFilters:
      {{- if .Values.config.isSubEnvironment }}
          - "{{ regexReplaceAll "^[^.]+\\." .Values.config.domain "" }}"
      {{- else }}
          - "{{ .Values.config.domain }}"
      {{- end }}

        sources:
          - gateway-httproute
        
        serviceAccount:
          create: true
          name: external-dns-sa
          annotations:
            iam.gke.io/gcp-service-account: "{{ .Values.config.namespacePrefix }}external-dns-sa@{{ .Values.config.projectID }}.iam.gserviceaccount.com"
        
        policy: sync

        # Apex TXT prefix so ExternalDNS can own and update the apex A record
        # (e.g. <env_name>.horizon-sdv.com). Without this, the apex gets no valid
        # ownership TXT and is not updated when the LB IP changes.
        txtPrefix: "%{record_type}-."
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true