{{- if not .Values.config.isSubEnvironment }}
# Allow Kubescape components to access Kubernetes API
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubescape-egress-to-kube-api
  namespace: kubescape
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubescape
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 443    # Kubernetes API
    - protocol: TCP
      port: 6443   # Kubernetes API (alternative port)
{{- end }}
---
# Allow Kubescape to scan all namespaces
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubescape-egress-to-all-namespaces
  namespace: kubescape
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubescape
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
{{- end }}
---
# Allow Kubescape internal communication
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubescape-internal-communication
  namespace: kubescape
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubescape
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: kubescape
    ports:
    - protocol: TCP
      port: 8080   # Kubescape, kubevuln, node-agent APIs
    - protocol: TCP
      port: 443    # Storage service, admission webhook
    - protocol: TCP
      port: 4002   # Operator service
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: kubescape
    ports:
    - protocol: TCP
      port: 8080   # Kubescape, kubevuln, node-agent APIs
    - protocol: TCP
      port: 443    # Storage service, admission webhook
    - protocol: TCP
      port: 4002   # Operator service
{{- end }}
---
# Allow Kubernetes API server to access Kubescape storage (for APIService)
{{- if .Values.config.enableNetworkPolicies }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-to-kubescape-storage
  namespace: kubescape
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app: storage
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 443    # Storage APIService
    - protocol: TCP
      port: 8443   # Storage APIService (alternative)
{{- end }}
{{- end }}
