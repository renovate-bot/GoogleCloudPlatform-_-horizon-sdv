apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}postgresql
  namespace: {{ .Values.config.namespacePrefix }}argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  source:
    repoURL: https://github.com/bitnami/charts
    targetRevision: {{ .Values.config.applications.postgresql.version }}
    path: bitnami/postgresql
    helm:
      values: |
        image:
          repository: bitnamilegacy/postgresql
        global:
          security:
            allowInsecureImages: true
          postgresql:
            auth:
              username: dbusername
              database: keycloak
              existingSecret: postgresql-initial-creds
              secretKeys:
                adminPasswordKey: postgres-password
                userPasswordKey: password
        primary:
          networkPolicy:
            enabled: false
          persistence:
            accessMode: "ReadWriteOnce"
            enabled: true
            existingClaim: "{{ .Values.config.namespacePrefix }}postgresql-data"
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}keycloak
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
