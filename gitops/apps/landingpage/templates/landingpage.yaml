apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.config.namespacePrefix }}landingpage
  namespace: {{ .Values.config.namespacePrefix }}horizon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: landingpage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: landingpage
    spec:
      containers:
      - name: landingpage
        image: {{ .Values.config.gitops.landingpage }}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.config.namespacePrefix }}landingpage
  namespace: {{ .Values.config.namespacePrefix }}horizon
spec:
  selector:
    app.kubernetes.io/name: landingpage
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
